<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expensify - Expense Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h2>Expensify - Expense Tracker</h2>
    </header>

  <main class="container">
  <section class="balance-container">
        <h4>Your Balance</h4>
        <h1 id="balance">Rs 0.00</h1>
  </section>

      <div class="inc-exp-container">
        <div>
        <h4>Income</h4>
          <p id="money-plus" class="money plus">+Rs 0.00</p>
        </div>
        <div>
          <h4>Expense</h4>
          <p id="money-minus" class="money minus">-Rs 0.00</p>
        </div>
      </div>

      <section class="history-container">
        <h3>History</h3>
        <ul id="list" class="list"></ul>
      </section>

      <section class="form-container">
        <h3 id="form-title">Add new transaction</h3>

        <form id="form">
          <input type="hidden" id="editing-id" value="" />

          <div class="form-control">
            <label for="text">Transaction Name</label>
            <input
              type="text"
              id="text"
              placeholder="e.g., Grocery shopping, Salary..."
              required
            />
          </div>

          <div class="form-control">
            <label for="amount">Amount</label>
            <small class="helper-text"
              >(Negative = expense, Positive = income)</small
            >
            <input
              type="number"
              step="0.01"
              id="amount"
              placeholder="Enter amount (e.g., -250 or 1500)..."
              required
            />
          </div>

          <div class="form-control">
            <label for="date">Transaction Date</label>
            <input type="date" id="date" required />
          </div>

  <button type="submit" id="submit-btn" class="btn">
            Add transaction
    </button>
       <button
            type="button"
            id="cancel-btn"
            class="btn cancel-btn"
            style="display: none"
          >
            Cancel Edit
          </button>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
